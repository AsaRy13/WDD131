
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="description" content="This page is a ponder page that shows how to use a drop down to change the theme. This is code I copied from my class.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 Dynamic Web Fundamentals</title>
    <link rel="stylesheet" href="dom-theme.css">
    <link rel="icon" href="https://wddbyui.github.io/wdd131/images/wdd131.png">
    <script src="dom-theme.js" defer></script>
  </head>
  <body>
    <div class="container">
        <h1>Pick a Theme</h1>
        <select id="theme-select">
            <option value="">-- Select a Theme --</option>
            <option value="ocean">Ocean</option>
            <option value="forest">Forest</option>
            <option value="desert">Desert</option>
        </select>
        <div class="content">
            <p>Try switching themes to change the page's look!</p>
        </div>
        <img id="logo" src=" https://wddbyui.github.io/wdd131/images/wdd131.png" alt="WDD131 Dynamic Web Logo">
    </div>
  </body>
</html>
