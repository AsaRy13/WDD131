<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Asa Ryan Fletcher">
    <meta name="description" content="Responsive gallery">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="gallery.css">
    <script src="gallery.js" defer></script>
</head>
<body>
    
<h1>Gallery</h1>
<section class="gallery">
    <figure>  
        <img src="images-1/images/book-sm.jpg" alt="person reading a book">
    </figure>
    <figure>  
        <img src="images-1/images/couch-sm.jpg" alt="person sitting on a couch with a phone">
    </figure>
    <figure>  
        <img src="images-1/images/desk-sm.jpg" alt="a work desktop">
    </figure>
    <figure>  
        <img src="images-1/images/keyboard-sm.jpg" alt="person typing on a keyboard">
    </figure>
    <figure>  
        <img src="images-1/images/phone-sm.jpg" alt="person looking at a phone">
    </figure>
    <figure>  
        <img src="images-1/images/sit-sm.jpg" alt="person sitting on a couch">
    </figure>
</section>
<dialog>
    <img>
    <button class="close-viewer">X</button>
</dialog>
          
</body>
</html>
