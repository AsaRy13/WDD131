<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Asa Ryan Fletcher">
        <meta name="description" content="This webpage features a simple recipe list with elements that use flexbox.">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Recipe Book</title>
        <link rel="stylesheet" href="recipes.css">
        <script src="recipes.js" defer></script>

        
        <!-- Open Graph (Facebook, LinkedIn, etc.) -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Recipe Book">
        <meta property="og:description" content="This webpage features recipes for many delicious foods and treats.">
        <meta property="og:url" content="https://asary13.github.io/WDD131/recipes">
        <meta property="og:image" content="images/recipe-book_1200x630.png">

        <!-- X Card -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Recipe Book">
        <meta name="twitter:description" content="This webpage features recipes for many delicious foods and treats.">
        <meta name="twitter:image" content="images/recipe-book_1200x630.png">

        <!-- One favicon (ICO works everywhere) -->
        <link rel="icon" href="images/recipe-book_64x64.png">

        <!-- One Apple Touch Icon (iOS home screen) -->
        <link rel="apple-touch-icon" href="images/recipe-book_180x180.png">
                
    </head>
    <body>
        <header>
            <div id="logo-container">
                <img src="images/recipe-book.png">
                <h1>RecipeBook</h1>
            </div>
            <div id="search-box">
                <input type="search" placeholder="Find a recipe" name="search" id="search">
                <button id="search-button"><img src="images/search.svg"></button>
            </div>
            <hr>
        </header>
        <main>
            <div id="content">
            </div>
        </main>
        <footer>
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons" id="icon-credits">Recipe icons created by Freepik - Flaticon</a>
            <div class="social">
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
                <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
                <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
                <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
            </div>
        </footer>
    </body>
</html>
