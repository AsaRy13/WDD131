<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Descriptive Meta Tags -->
        <meta name="author" content="Asa Ryan Fletcher">
        <meta name="description" content="This webpage features a simple character card.">


        <!-- Page Format Meta Tags -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">


        <!-- Social Media Meta Tags -->
        <!-- Open Graph (for Facebook, LinkedIn, etc.) -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Character Card">
        <meta property="og:description" content="This webpage features a simple character card.">
        <meta property="og:url" content="https://asary13.github.io/WDD131/charactercard">
        <meta property="og:image" content="snortleblat.webp">

        <!-- Twitter Card -->
        <meta name="twitter:card" content="snortleblat.webp">
        <meta name="twitter:title" content="Character Card">
        <meta name="twitter:description" content="This webpage features a simple character card.">
        <meta name="twitter:image" content="snortleblat.webp">


        <!-- Tab Tags -->
        <title>Character Card</title>

        <!-- Favicon -->
        <link rel="icon" href="snortleblat_64x64.png">

        <!-- Apple Touch Icon -->
        <link rel="apple-touch-icon" href="snortleblat_180x180.png">


        <!-- External Scripts -->
        <link rel="stylesheet" href="charactercard.css">
        <script src="charactercard.js" defer></script>
    </head>
    <body>
        <div class="card">
            <img src="snortleblat.webp" class="image" alt="Image of Snortleblat in a swamp.">
            <h1 class="name">Snortleblat</h1>
            <section class="stats"></section>
            <div class="buttons">
                <button id="attacked">Attacked</button>
                <button id="levelUp">Level Up</button>
            </div>
        </div>
    </body>
</html>
